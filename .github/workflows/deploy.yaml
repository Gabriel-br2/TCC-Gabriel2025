name: Nuitka Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: pip install -r requirements-client.txt

      - name: Build Executable
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: client.py
          mode: app
          output-file: client-human
          include-data-dir: |
            config=config
          nofollow-import-to: |
            game.analysis
            game.server
            game.llm
            openai
            ollama
            matplotlib
            pandas
            seaborn
            rerun

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-human Build
          path: |
            build/*.exe
            build/*.bin
            build/*.app
            build/*.app/**/*
          include-hidden-files: true
